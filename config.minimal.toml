# Minimal NNTP Proxy Configuration
# This is the simplest useful configuration: one backend server plus defaults.

# Defaults:
# - Binds to 0.0.0.0:8119
# - Hybrid routing mode (automatic per-command to stateful switching)
# - Availability-only article cache mode
# - Default transport memory settings
# - No client authentication
# - Max 10 connections per backend
# - No TLS
#
# To override the defaults, add [proxy], [routing], [memory], [cache], or
# [client_auth] sections above the server list.

[[servers]]
host = "news.example.com"
port = 119
name = "News Server"
